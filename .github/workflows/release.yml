name: Deploy WoW Addon

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Clone Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pack and Upload Addon
        uses: BigWigsMods/packager@v2
        with:
          args: -c ${{ secrets.CF_API_KEY }} -p 1575293
