name: Deploy WoW Addon

on:
  push:
    tags:
      - 'v*' # Triggered den Workflow, sobald ein Tag wie v1.0.0 gepusht wird

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      # 1. Quellcode auschecken (Wichtig: fetch-depth: 0 für Changelogs)
      - name: Clone Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. BigWigs Packager ausführen und zu CurseForge hochladen
      - name: Pack and Upload Addon
        uses: BigWigsMods/packager@v2
        with:
          args: -c ${{ secrets.CF_API_KEY }}
